name: 🚀 Testes Backend

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seuservico_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seuservico_test
      SECRET_KEY: test_secret
      ALGORITHM: HS256

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: 📦 Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: ⏳ Esperar banco subir
        run: |
          sleep 5

      - name: 🧪 Rodar testes
        run: |
          pytest -v